# Per-function settings. See: https://supabase.com/docs/guides/functions/function-configuration
#
# The platform JWT gate was returning 401 "Invalid JWT" before our handler ran.
# We still authenticate inside the function with createClient(...).auth.getUser(token).
[functions.admin-api]
verify_jwt = false

[functions.google-calendar-auth]
verify_jwt = false

[functions.google-calendar-events]
verify_jwt = false

[functions.google-calendar-disconnect]
verify_jwt = false
